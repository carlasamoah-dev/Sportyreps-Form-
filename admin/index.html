<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportyreps Admin Panel</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <!-- Chart.js for Summary page charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase JS Client for Admin Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Login Overlay -->
  <div id="login-overlay" class="login-overlay active">
    <div class="login-box">
      <h2>Welcome Back</h2>
      <p>Log in to the Admin Dashboard</p>
      
      <div class="login-form">
        <div>
          <label for="admin-email">Email Address</label>
          <input type="email" id="admin-email" placeholder="admin@sportyreps.com" />
        </div>
        <div>
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" placeholder="••••••••" />
        </div>
        <div id="login-error" class="error-text"></div>
        <button id="login-btn" class="btn-primary">Sign In</button>
      </div>
    </div>
  </div>

  <!-- Main Dashboard (Hidden until login) -->
  <div id="dashboard" class="dashboard hidden">
    
    <!-- Top Navigation / Header -->
    <header class="app-header">
      <div class="header-left">
        <svg width="17" height="17" viewBox="0 0 24 24" style="color:var(--text-muted);"><rect x="3" y="4" width="18" height="16" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.9"></rect><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.9"></line><line x1="9" y1="9" x2="9" y2="20" stroke="currentColor" stroke-width="1.9"></line></svg>
        <span style="color:var(--text-muted);">Forms</span>
        <span style="color:var(--text-disabled);">›</span>
        <button class="btn-text">
          <span style="color:var(--text-primary); font-weight: 600;">Football Talent application</span>
          <svg width="13" height="13" viewBox="0 0 24 24" style="color:var(--text-muted); margin-left: 4px;"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg>
        </button>
      </div>
      
      <nav class="header-center">
        <!-- Kept Results as the active main section, removed others per request -->
        <button class="btn-text" style="background:var(--bg-subtle); color:var(--text-primary); font-weight:600; border-radius:8px;">Results</button>
      </nav>
      
      <div class="header-right">
        <!-- Removed 'View plans' and '?' buttons -->
        <div style="width:28px;height:28px;border-radius:50%;background:#c026d3;color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;">CA</div>
        <button id="logout-btn" class="btn-secondary" style="padding: 4px 8px; font-size:12px; height: 28px;">Logout</button>
      </div>
    </header>

    <!-- Sub Navigation -->
    <nav class="sub-nav">
      <!-- Removed Smart Insights and Insights -->
      <button class="tab-btn" data-target="summary-view">Summary</button>
      <button class="tab-btn active" data-target="responses-view">Responses [<span id="response-count">0</span>]</button>
    </nav>

    <!-- Responses Data Grid View -->
    <main id="responses-view" class="view-panel active">
      <div class="table-toolbar">
        <button class="btn-secondary" style="font-weight:600; color:var(--text-primary); background:var(--bg-subtle); border:none;">
          <svg width="15" height="15" viewBox="0 0 24 24" style="color:var(--text-muted);"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.8"></line></svg>
          Responses
        </button>
        <div class="search-wrapper">
          <svg width="15" height="15" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.9"></circle><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></line></svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search responses" />
        </div>
        <button id="time-filter-btn" class="btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" style="color:var(--text-muted);"><rect x="4" y="5" width="16" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect><line x1="4" y1="9.5" x2="20" y2="9.5" stroke="currentColor" stroke-width="1.8"></line><line x1="8" y1="3" x2="8" y2="6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line><line x1="16" y1="3" x2="16" y2="6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line></svg>
          <span id="time-filter-label">All time</span>
        </button>
        <button id="role-filter-btn" class="btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" style="color:var(--text-muted);"><path d="M3 5h18l-7 8v6l-4-2v-4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path></svg>
          <span id="role-filter-label">All Roles</span>
        </button>
        
        <div style="margin-left:auto; display:flex; gap:6px;">
          <button class="btn-icon" title="Row height">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 4v16M12 4l-3 3M12 4l3 3M12 20l-3-3M12 20l3-3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </button>
          <button id="column-settings-btn" class="btn-icon" title="Column settings">
            <svg width="16" height="16" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect><line x1="10" y1="4" x2="10" y2="20" stroke="currentColor" stroke-width="1.8"></line><line x1="16" y1="4" x2="16" y2="20" stroke="currentColor" stroke-width="1.8"></line></svg>
          </button>
          <button class="btn-icon" title="Export">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 3v11m0 0l-4-4m4 4l4-4M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </button>
          <!-- Removed Generate test response -->
        </div>
      </div>
      
      <div class="table-wrapper">
        <table id="data-grid" class="data-grid">
          <thead id="grid-head"></thead>
          <tbody id="grid-body"></tbody>
        </table>
      </div>
    </main>

    <!-- Summary View -->
    <main id="summary-view" class="view-panel hidden">
      <div class="summary-container" id="summary-container" style="max-width: 900px; margin: 0 auto; width: 100%; padding-top: 24px;">
        <!-- Rendered by render.js -->
      </div>
    </main>
  </div>

  <!-- Column Settings Popover (Drawer Style) -->
  <div id="column-drawer-overlay" class="column-drawer-overlay hidden"></div>
  <aside id="column-drawer" class="column-drawer hidden">
    <div class="column-drawer-header">
      <svg width="16" height="16" viewBox="0 0 24 24" style="color:var(--text-muted)"><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect><line x1="10" y1="4" x2="10" y2="20" stroke="currentColor" stroke-width="1.8"></line><line x1="16" y1="4" x2="16" y2="20" stroke="currentColor" stroke-width="1.8"></line></svg>
      <span>Column settings</span>
      <button id="close-columns-btn" class="btn-text" style="margin-left:auto; font-size: 20px; line-height: 1;">×</button>
    </div>
    <div class="column-drawer-body" id="column-list">
      <!-- Rendered by render.js -->
    </div>
    <div style="flex-shrink:0; display:flex; align-items:center; padding:12px 16px; border-top:1px solid var(--border-color);">
      <button id="reset-columns-btn" class="btn-text">Reset to default</button>
      <button id="save-columns-btn" class="btn-primary" style="margin-left:auto;">Save</button>
    </div>
  </aside>

  <!-- Detail Drawer -->
  <div id="detail-drawer-overlay" class="detail-drawer-overlay hidden"></div>
  <aside id="detail-drawer" class="detail-drawer hidden">
    <div class="detail-drawer-header">
      <div style="display:flex; gap:2px;">
        <button class="btn-icon" style="width:30px; height:30px;"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
        <button class="btn-icon" style="width:30px; height:30px;"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      </div>
      <span style="font-size:13.5px; font-weight:600;" id="drawer-timestamp">11 Mar 2024 23:47</span>
      <span class="status-badge"><span class="dot"></span>Completed</span>
      <div style="margin-left:auto; display:flex; gap:2px;">
        <button id="close-drawer-btn" class="btn-text" style="font-size: 20px; line-height: 1;">×</button>
      </div>
    </div>
    <div class="detail-drawer-body" id="drawer-body">
      <!-- Rendered by render.js -->
    </div>
  </aside>

  <!-- File Preview Modal -->
  <div id="preview-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title" style="font-size: 15px;">Attachment Preview</h3>
        <button id="close-modal-btn" class="btn-text" style="font-size: 20px; line-height: 1;">×</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Rendered by render.js -->
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
